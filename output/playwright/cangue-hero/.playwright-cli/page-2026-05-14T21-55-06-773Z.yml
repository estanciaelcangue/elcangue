    - generic [ref=e43]:
      - img "Foto histórica de la familia fundadora" [ref=e46]
      - generic [ref=e47]:
        - paragraph [ref=e48]: Nuestra Historia
        - generic [ref=e49]:
          - paragraph [ref=e50]: La historia de la Estancia El Cangüé es una historia de supervivencia y de amor profundo por nuestras raíces, sobrevivencia al paso del tiempo, nunca tan cierto aquello de que "las nuevas del tiempo plasarán su mies". Por acá discurrieron tantos años de vida, estas viejas paredes y campos han sido testigo de todos los acontecimientos importantes de la vida, matrimonios, nacimientos, cumpleaños... pero también tristes partidas.
          - paragraph [ref=e51]: Cuántas historias de vida llenan sus memorias como algo vivo, tangible, que constituyen quizás, el espíritu de la Estancia que nos envuelve como un manto apenas entrar. Una "casa con alma". Y amor profundo que se vuelve eterno cuando se transmite de padres a hijos, por la tierra y la naturaleza que nos rodea.
          - paragraph [ref=e52]: Para nuestra familia, nuestra historia de amor con la estancia comenzó por allá por el 1920, cuando Pablo, un inmigrante de padre alemán y madre belga, se conoció y se enamoró de su vecina de balcón en el barrio de Caballito en Buenos Aires. Anita, una inmigrante polaca, salvada por su madrina de la disolución de la Polonia de posguerra.
          - paragraph [ref=e53]: De esta vecindad fortuita nació una boda y de allí una familia que llegó a Uruguay por los años 20 en busca de nuevos horizontes y establecer raíces. Así comenzó nuestra historia en El Cangüé.
        - link "Reservar ahora" [ref=e55] [cursor=pointer]:
          - /url: "#alojamiento"
